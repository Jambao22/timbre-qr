
<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Timbre QR</title>

<style>

body{
    background:#0f172a;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;

}

.contenedor{
    max-width:500px;

    background:#1e293b;
    padding:25px;
    border-radius:15px;
}

input,select{
    width:100%;

}

button{

button:disabled{
    background:#64748b;
}

#estado{
    margin-top:20px;
    font-size:18px;
}

</style>

</head>

<body>

<input

</select>

<button id="btnTimbre">
🔔 TOCAR TIMBRE
</button>

<div id="estado"></div>

</div>

<script>

const token = "8819671085:AAEx3Po7WWh85muYbMsBYjWU6ei4Q1K-8kU";
const chatid = "-5571681814";

const btn = document.getElementById("btnTimbre");
const estado = document.getElementById("estado");

verificarBloqueo();

btn.addEventListener("click", tocarTimbre);

const nombre =

function verificarBloqueo(){

const ultimo =
localStorage.getItem("ultimoTimbre");

if(!ultimo) return;

const diferencia =
Date.now() - parseInt(ultimo);

if(diferencia < 600000){

iniciarCuentaRegresiva();

}

}

function iniciarCuentaRegresiva(){

btn.disabled = true;

const intervalo = setInterval(() => {

const ultimo =
localStorage.getItem("ultimoTimbre");

const diferencia =
Date.now() - parseInt(ultimo);

const restante =
600000 - diferencia;

if(restante <= 0){

clearInterval(intervalo);

btn.disabled = false;

estado.innerHTML =
"✅ Puede volver a tocar el timbre";

localStorage.removeItem("ultimoTimbre");

return;

}

const minutos =
Math.floor(restante/60000);

const segundos =
Math.floor((restante%60000)/1000);

estado.innerHTML =
"⏳ Espere " +
minutos +
"m " +
segundos +
"s para volver a tocar";

},1000);

}
