<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timbre QR</title>

<style>

body{
    background:#0f172a;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
    padding:20px;
}

.contenedor{
    max-width:550px;
    margin:auto;
    background:#1e293b;
    padding:25px;
    border-radius:15px;
}

input,select,textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:18px;
    font-size:20px;
    border:none;
    border-radius:10px;
    background:#22c55e;
    color:white;
    cursor:pointer;
    margin-top:10px;
}

button:disabled{
    background:#64748b;
}

#estado{
    margin-top:20px;
    font-size:18px;
}

hr{
    margin:25px 0;
}

</style>

</head>

<body>

<div class="contenedor">

<h1>🏠 Timbre de Casa</h1>

<p>Complete los datos antes de continuar</p>

<input
type="text"
id="nombre"
placeholder="Ingrese su nombre">

<select id="motivo">
<option value="">Seleccione un motivo</option>
<option>👥 Visita</option>
<option>📦 Entrega</option>
<option>🛠 Técnico</option>
<option>🚨 Emergencia</option>
</select>

<button id="btnTimbre">
🔔 TOCAR TIMBRE
</button>

<div id="estado"></div>

<hr>

<h2>📝 Dejar Mensaje</h2>

<textarea
id="mensajeVisitante"
rows="5"
placeholder="Escriba su mensaje..."></textarea>

<button id="btnMensaje">
📨 ENVIAR MENSAJE
</button>

<div id="estadoMensaje"></div>

</div>

<audio id="sonidoTimbre">
<source src="timbre.mp3" type="audio/mpeg">
</audio>

<audio id="sonidoEnviado">
<source src="enviado.mp3" type="audio/mpeg">
</audio>

<script>

const token = "8819671085:AAEx3Po7WWh85muYbMsBYjWU6ei4Q1K-8kU";
const chatid = "-5571681814";

const TIEMPO_ESPERA = 300000;

const btn = document.getElementById("btnTimbre");
const estado = document.getElementById("estado");

const btnMensaje = document.getElementById("btnMensaje");
const estadoMensaje = document.getElementById("estadoMensaje");
const MENSAJE_UNICO = true;

const BLOQUEO_MENSAJE = 86400000; // 24 horas

const ultimoMensaje =
localStorage.getItem("mensajeEnviado");

if(ultimoMensaje){

const diferencia =
Date.now() - parseInt(ultimoMensaje);

if(diferencia < BLOQUEO_MENSAJE){

btnMensaje.disabled = true;

const horas =
Math.ceil(
(BLOQUEO_MENSAJE - diferencia)
/
3600000
);

estadoMensaje.innerHTML =
"⛔ Ya se dejó un mensaje. Intente nuevamente en aproximadamente " +
horas +
" horas.";

}else{

localStorage.removeItem("mensajeEnviado");

}

}

verificarBloqueo();

btn.addEventListener("click", tocarTimbre);
btnMensaje.addEventListener("click", enviarMensaje);

function obtenerDispositivo(){

const ua = navigator.userAgent;

if(/android/i.test(ua)) return "Android";
if(/iPhone|iPad|iPod/i.test(ua)) return "iPhone/iPad";
if(/Windows/i.test(ua)) return "Windows";
if(/Mac/i.test(ua)) return "Mac";

return "Desconocido";

}

function validarCampos(){

const nombre =
document.getElementById("nombre").value.trim();

const motivo =
document.getElementById("motivo").value;

if(nombre === ""){

alert("Debe ingresar su nombre");
return false;

}

if(motivo === ""){

alert("Debe seleccionar un motivo");
return false;

}

return true;

}

if(!validarCampos()) return;

document.getElementById("sonidoTimbre").play();

obtenerUbicacion(function(ubicacion){

const nombre =
document.getElementById("nombre").value.trim();

const motivo =
document.getElementById("motivo").value;

ahora.toLocaleDateString("es-AR");

const hora =
ahora.toLocaleTimeString("es-AR");

const dispositivo =
obtenerDispositivo();

const mensaje = encodeURIComponent(

"🏠 TIMBRE QR\n\n" +

"📌 Motivo: " + motivo + "\n" +

function enviarMensaje(){
const ultimoMensaje =
localStorage.getItem("mensajeEnviado");

if(ultimoMensaje){

const diferencia =
Date.now() - parseInt(ultimoMensaje);

if(diferencia < 86400000){

estadoMensaje.innerHTML =
"⛔ Ya se dejó un mensaje en las últimas 24 horas.";

return;

}

}
if(!validarCampos()) return;

const texto =
document.getElementById("mensajeVisitante").value.trim();

if(texto === ""){

alert("Debe escribir un mensaje");
return;

}

obtenerUbicacion(function(ubicacion){

const nombre =
document.getElementById("nombre").value.trim();

const motivo =
document.getElementById("motivo").value;

const dispositivo =
obtenerDispositivo();

const mensaje = encodeURIComponent(

"📝 MENSAJE DEL VISITANTE\n\n" +

"👤 Nombre: " + nombre + "\n" +

"📌 Motivo: " + motivo + "\n" +

"📱 Dispositivo: " + dispositivo + "\n\n" +

"💬 Mensaje:\n" +

texto +

"\n\n" +

ubicacion

);

fetch(

)

localStorage.setItem(

);

btnMensaje.disabled = true;
document.getElementById("sonidoEnviado").play();

estadoMensaje.innerHTML =

}else{

}

function enviarTelegram(mensaje,bloquear){

fetch(
`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatid}&text=${mensaje}`
)
.then(response => response.json())
.then(data => {

if(data.ok){

document.getElementById("sonidoEnviado").play();

estado.innerHTML =
"✅ Notificación enviada correctamente";

if(bloquear){

localStorage.setItem(
"ultimoTimbre",
Date.now()
);

iniciarCuentaRegresiva();

}

}else{

estado.innerHTML =
"❌ Error enviando el mensaje";

}

})
.catch(() => {

estado.innerHTML =
"❌ Error de conexión";

});

}

function verificarBloqueo(){

const ultimo =
localStorage.getItem("ultimoTimbre");

if(!ultimo) return;

const diferencia =
Date.now() - parseInt(ultimo);

if(diferencia < TIEMPO_ESPERA){

iniciarCuentaRegresiva();

}

}

function iniciarCuentaRegresiva(){

btn.disabled = true;

const intervalo = setInterval(() => {

const ultimo =
localStorage.getItem("ultimoTimbre");

const diferencia =
Date.now() - parseInt(ultimo);

const restante =
TIEMPO_ESPERA - diferencia;

if(restante <= 0){

clearInterval(intervalo);

btn.disabled = false;

estado.innerHTML =
"✅ Puede volver a tocar el timbre";

localStorage.removeItem(
"ultimoTimbre"
);

return;

}

const minutos =
Math.floor(restante/60000);

const segundos =
Math.floor((restante%60000)/1000);

estado.innerHTML =
"⏳ Espere " +
minutos +
"m " +
segundos +
"s para volver a tocar";

},1000);

}

</script>

</body>
</html>
